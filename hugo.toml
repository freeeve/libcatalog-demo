baseURL = "https://libcat.evefreeman.com/"
title = "Eve's Library"
languageCode = "en-us"
defaultContentLanguage = "en"

# Upcoming events are future-dated; without this Hugo skips future content (tasks/007).
buildFuture = true

# Adopt the libcat Hugo module: one page per Work, faceted navigation, accessible
# multilingual chrome -- all from the projected catalog.json / facets.json under assets/.
[module]
  [[module.imports]]
    path = "github.com/freeeve/libcat/hugo"

[pagination]
  pagerSize = 12

# Required by the module: Hugo does not merge a module's [taxonomies], so declare them
# here (copied verbatim from the module README).
[taxonomies]
  language = "languages"
  subject = "subjects"
  tag = "tags"
  format = "formats"
  contributor = "contributors"
  classification = "classifications"

# Pagefind search (libcat tasks/017): real ranked, per-language, CJK-capable
# full-text over the built HTML. Post-build step: `npm run search:index` after `hugo`.
[params.search]
  engine = "pagefind"

# Primary navigation (Hugo menus). The catalog is one section (/works/) of an ordinary
# library site -- Home is a normal landing page, not the catalog (tasks/007).
[[menu.main]]
  name = "Home"
  url = "/"
  weight = 10
[[menu.main]]
  name = "Catalog"
  url = "/works/"
  weight = 20
[[menu.main]]
  name = "Events"
  url = "/events/"
  weight = 30
[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 40
[[menu.main]]
  name = "How it's built"
  url = "/docs/"
  weight = 50

[params]
  # This is a public demo of the libcat framework + Hugo, not a real collection.
  demo = true
  tagline = "a libcat + Hugo demo"
  description = "Eve's Library is a public demo of the libcat framework and its Hugo module: a faceted, accessible, statically searchable catalog with no backend."
  ogImage = "/og-default.png"  # social share fallback for pages without a cover (tasks/005)

  # Cover art (libcat tasks/025): the module renders a cover slot on result cards and
  # Work detail pages from each Work's extra.cover (forwarded by the content adapter,
  # tasks/022), falling back to a lettered placeholder. Our Hardcover pipeline supplies it.
  covers = true

  # Subject vocabulary facet groups (module tasks/141, ours tasks/024): the v9 projection
  # carries a scheme on every subject, so the sidebar renders one group per vocabulary and
  # term URLs are scheme-prefixed (/subjects/homosaurus-.../). Order here is group order.
  [[params.subjectSchemes]]
    scheme = "lcsh"
    name = "LCSH"
  [[params.subjectSchemes]]
    scheme = "homosaurus"
    name = "Homosaurus"

  # Shared facet sidebar (module tasks/150, ours tasks/025): publish the page-invariant
  # sidebar once per language as a fingerprinted fragment (/lcat/facets.<lang>.<hash>.html)
  # fetched by lcat-sidebar.js, instead of inlining it into every list/term page. This
  # catalog is small enough that inline would be fine -- enabled to showcase the feature
  # and give it a second real deployment. Trade-off: the sidebar appears one fetch after
  # first paint and leaves the crawled HTML (no-JS readers get fallback taxonomy links).
  [params.facets]
    shared = true

  # Fake public-library info for the demo homepage (tasks/007). Not a real library.
  [params.library]
    address = "123 Static Way, Evergreen"
    phone = "(555) 010-0100"
    email = "hello@evefreeman.com"
    [params.library.hours]
      weekdays = "Mon–Thu 9am–8pm, Fri 9am–6pm"
      weekend = "Sat 10am–5pm, Sun 12pm–5pm"
